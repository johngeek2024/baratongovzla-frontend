<!--
  El panel en sí. Usamos [ngClass] para aplicar clases condicionalmente:
  - 'translate-x-0' (visible) si isOpen es true.
  - '-translate-x-full' o 'translate-x-full' (oculto) si isOpen es false.
  - 'left-0' o 'right-0' dependiendo de la posición.
-->
<div
  class="fixed top-0 h-full w-[90%] max-w-md bg-dark-bg/80 backdrop-blur-lg border-white/10 shadow-2xl z-[100] transition-transform duration-500 ease-in-out flex flex-col"
  [ngClass]="{
    'translate-x-0': isOpen,
    'left-0 -translate-x-full': position === 'left' && !isOpen,
    'right-0 translate-x-full': position === 'right' && !isOpen,
    'border-l': position === 'right',
    'border-r': position === 'left'
  }">

  <!-- Cabecera del Panel con Título y Botón de Cierre -->
  <div class="flex justify-between items-center p-6 border-b border-white/10 flex-shrink-0">
    <h3 class="font-headings text-2xl text-white">{{ title }}</h3>
    <button (click)="close.emit()" class="text-text-secondary text-3xl transition-transform hover:text-white hover:rotate-90">&times;</button>
  </div>

  <!-- Contenido del Panel -->
  <div class="p-6 flex-grow overflow-y-auto">
    <!-- ng-content es un marcador de posición. Aquí se insertará el contenido específico (ej. la lista del menú). -->
    <ng-content></ng-content>
  </div>

</div>
