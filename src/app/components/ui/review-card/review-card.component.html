<!--
  Cambiamos el fondo a blanco (bg-white) y el texto a oscuro (text-text-primary).
  Añadimos un borde sutil y una sombra para darle profundidad.
-->
<article class="bg-white p-8 rounded-2xl border border-gray-200 flex flex-col gap-4 shadow-lg transition-transform duration-300 hover:-translate-y-2">
  <!-- Cabecera con avatar y nombre -->
  <div class="flex items-center gap-4">
    <img [src]="review.avatarUrl" [alt]="'[Avatar de ' + review.author + ']'" class="w-12 h-12 rounded-full object-cover">
    <div class="leading-tight">
      <p class="font-bold text-text-primary">{{ review.author }}</p>
      <p class="text-sm text-green-600 font-medium">
        <i class="fas fa-check-circle mr-1"></i> Compra Verificada
      </p>
    </div>
  </div>

  <!-- Estrellas de calificación -->
  <div class="text-green-500 text-lg">
    <i class="fas fa-star"></i>
    <i class="fas fa-star"></i>
    <i class="fas fa-star"></i>
    <i class="fas fa-star"></i>
    <i class="fas fa-star"></i>
  </div>

  <!-- Contenido de la reseña -->
  <blockquote class="relative">
    <p class="text-text-secondary leading-relaxed pl-8">"{{ review.text }}"</p>
    <i class="fas fa-quote-left absolute -left-1 -top-1 text-4xl text-primary-accent opacity-10"></i>
  </blockquote>
</article>
