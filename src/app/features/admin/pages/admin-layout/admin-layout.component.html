<div class="admin-layout admin-theme">
  <aside class="admin-sidebar" [class.open]="isMobileMenuOpen()">
    <header class="sidebar-header">
      <img src="assets/isologo-blanco.svg" alt="Logo BaratongoVzla">
    </header>

    <nav class="sidebar-nav">
      @for(link of navLinks; track link.id) {
        <a [routerLink]="link.id"
           routerLinkActive="active"
           (click)="isMobileMenuOpen.set(false)">
          <i class="fas {{ link.icon }}"></i>
          <span>{{ link.label }}</span>
        </a>
      }
    </nav>

    <footer class="sidebar-footer">
      <a (click)="handleLogout()" class="logout-btn">
        <i class="fas fa-sign-out-alt"></i>
        <span>Cerrar Sesión</span>
      </a>
    </footer>
  </aside>

  <main class="admin-main-content">
    <header class="mobile-top-bar">
      <img src="assets/isologo-blanco.svg" alt="Logo" class="logo">
      <button class="mobile-menu-trigger" (click)="isMobileMenuOpen.set(!isMobileMenuOpen())">
        <i class="fas fa-bars"></i>
      </button>
    </header>

    <router-outlet></router-outlet>
  </main>
</div>

<style>
  /* ✅ CORRECCIÓN: Se unifica el formato de las variables a HSL (Hue, Saturation, Lightness)
     para ser 100% compatible con la configuración de Tailwind y los modificadores de opacidad. */
  .admin-theme {
    --color-dark-bg: 220 17% 5%;             /* #0A0C10 */
    --color-dark-bg-secondary: 222 47% 11%; /* #111827 */
    --color-primary-accent: 199 100% 50%;    /* #00A9FF */
    --color-text-primary: 220 14% 90%;       /* #E5E7EB */
    --color-text-secondary: 215 9% 65%;     /* #9CA3AF */
    --color-text-on-dark: 220 14% 91%;
    --color-border: 215 16% 27%;           /* #374151 */
    --color-success: 145 63% 49%;           /* #22c55e */
    --color-warning: 38 92% 53%;           /* #f59e0b */
    --color-danger: 4 85% 61%;             /* #ef4444 */
  }

  :host {
    @apply bg-dark-bg text-text-primary font-sans;
  }
  .admin-layout { @apply flex min-h-screen; }

  /* --- Sidebar --- */
  .admin-sidebar {
    @apply w-64 bg-dark-bg-secondary border-r border-border-color p-6 flex-col flex-shrink-0 hidden md:flex;
  }
  .sidebar-header { @apply text-center mb-8; }
  .sidebar-header img { @apply h-10; }
  .sidebar-nav { @apply flex-grow; }
  .sidebar-nav a, .sidebar-footer a {
    @apply flex items-center gap-4 px-4 py-3 rounded-lg text-text-secondary font-medium transition-all duration-200 mb-2 cursor-pointer;
  }
  .sidebar-nav a:hover, .sidebar-nav a.active {
    @apply bg-primary-accent text-dark-bg shadow-lg shadow-primary-accent/20;
  }
  .sidebar-nav a i, .sidebar-footer a i { @apply w-5 text-center text-lg; }
  .sidebar-footer { @apply border-t border-border-color pt-6; }
  .sidebar-footer .logout-btn { @apply text-danger; }
  .sidebar-footer .logout-btn:hover { @apply bg-danger/10 text-danger shadow-none; }

  /* --- Contenido Principal --- */
  .admin-main-content { @apply flex-grow p-4 sm:p-8; }

  /* --- Versión Móvil --- */
  .mobile-top-bar {
    @apply md:hidden flex justify-between items-center pb-6 mb-6 border-b border-border-color;
  }
  .mobile-top-bar .logo { @apply h-8; }
  .mobile-menu-trigger { @apply text-2xl text-text-primary bg-transparent border-none; }

  /* Sidebar móvil */
  @media (max-width: 767px) {
    .admin-sidebar {
      @apply fixed top-0 left-0 h-full z-50 transition-transform duration-300 ease-in-out -translate-x-full;
    }
    .admin-sidebar.open {
      @apply translate-x-0;
    }
  }
</style>
