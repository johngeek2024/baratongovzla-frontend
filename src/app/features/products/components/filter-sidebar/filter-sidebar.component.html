<!--
  Este componente tiene dos estados visuales controlados por las clases de Tailwind:
  1. Por defecto (Móvil): Es 'fixed', ocupa toda la altura, está fuera de la pantalla ('-translate-x-full').
  2. En pantallas medianas o más grandes ('md:'): Se vuelve 'sticky', con una altura automática y se posiciona correctamente.
  La clase 'translate-x-0' se aplica condicionalmente para mostrarlo en la vista móvil.
-->
<aside
  class="fixed inset-y-0 left-0 z-[110] w-[300px] flex-shrink-0 bg-dark-bg-secondary border-r border-border-color p-6 h-full transition-transform duration-300 ease-in-out -translate-x-full md:relative md:h-fit md:w-[280px] md:rounded-2xl md:border md:translate-x-0 md:top-[100px]"
  [ngClass]="{ 'translate-x-0': uiService.isFilterSidebarOpen() }">

  <!-- Grupo de Categorías -->
  <div class="mb-8">
    <h3 class="text-lg font-semibold text-text-primary pb-3 mb-4 border-b border-border-color">Categorías</h3>
    <nav class="flex flex-col gap-2">
      <!--
        El evento (click) llama a la función closeAllPanels() del UiService,
        lo que cerrará este panel en la vista móvil al seleccionar una categoría.
      -->
      <a (click)="uiService.closeAllPanels()" routerLink="/products/proyectores" [class.active]="activeCategory() === 'proyectores'" class="category-link">
        <i class="fas fa-satellite-dish w-5 text-center"></i> Proyectores
      </a>
      <a (click)="uiService.closeAllPanels()" routerLink="/products/gaming" [class.active]="activeCategory() === 'gaming'" class="category-link">
        <i class="fas fa-gamepad w-5 text-center"></i> Gaming
      </a>
      <a (click)="uiService.closeAllPanels()" routerLink="/products/smartwatches" [class.active]="activeCategory() === 'smartwatches'" class="category-link">
        <i class="far fa-clock w-5 text-center"></i> Smartwatches
      </a>
    </nav>
  </div>

  <!-- Grupo de Filtros Generales -->
  <div class="mb-8">
    <h3 class="text-lg font-semibold text-text-primary pb-3 mb-4 border-b border-border-color">Filtros</h3>
    <div class="flex justify-between items-center mb-4">
      <span class="text-text-primary">En Oferta</span>
      <label class="relative inline-block w-11 h-6">
        <input (change)="onSaleChange($event)" type="checkbox" class="opacity-0 w-0 h-0 peer">
        <span class="absolute cursor-pointer inset-0 bg-border-color rounded-full transition-colors before:absolute before:h-4 before:w-4 before:left-1 before:bottom-1 before:bg-white before:rounded-full before:transition-transform peer-checked:bg-primary-accent peer-checked:before:translate-x-5"></span>
      </label>
    </div>
  </div>

  <!-- Grupo de Filtro de Precio -->
  <div class="mb-8">
    <h3 class="text-lg font-semibold text-text-primary pb-3 mb-4 border-b border-border-color">Precio</h3>
    <div class="flex justify-between text-sm mb-2 text-text-primary">
      <span>$50</span>
      <span>${{ productService.maxPriceFilter() }}</span>
    </div>
    <input (input)="onPriceChange($event)" type="range" min="50" max="1000" [value]="productService.maxPriceFilter()" class="w-full h-1 bg-border-color rounded-full appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:bg-primary-accent [&::-webkit-slider-thumb]:rounded-full">
  </div>

  <!--
    FILTROS CONTEXTUALES (CORREGIDO Y RESTAURADO)
    Estos bloques @if aseguran que los filtros solo se muestren para la categoría activa.
  -->
  @if(activeCategory() === 'proyectores') {
    <div class="filter-group contextual-filter-group">
      <h3 class="text-lg font-semibold text-text-primary pb-3 mb-4 border-b border-border-color">Resolución</h3>
      <div class="flex justify-between items-center mb-4">
        <span class="text-text-primary">4K</span>
        <label class="relative inline-block w-11 h-6">
          <input type="checkbox" class="opacity-0 w-0 h-0 peer">
          <span class="slider"></span>
        </label>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span class="text-text-primary">1080p</span>
        <label class="relative inline-block w-11 h-6">
          <input type="checkbox" class="opacity-0 w-0 h-0 peer">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  }

  @if(activeCategory() === 'gaming') {
    <div class="filter-group contextual-filter-group">
      <h3 class="text-lg font-semibold text-text-primary pb-3 mb-4 border-b border-border-color">Tipo de Teclado</h3>
      <div class="flex justify-between items-center mb-4">
        <span class="text-text-primary">Mecánico</span>
        <label class="relative inline-block w-11 h-6">
          <input type="checkbox" class="opacity-0 w-0 h-0 peer">
          <span class="slider"></span>
        </label>
      </div>
      <div class="flex justify-between items-center mb-4">
        <span class="text-text-primary">Membrana</span>
        <label class="relative inline-block w-11 h-6">
          <input type="checkbox" class="opacity-0 w-0 h-0 peer">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  }
</aside>
